<body>

  <div class="container">
    <div class="hire-teacher-container">
      <h2 class="text-center">Online Teacher Hiring System</h2>
      <form action="hire_teacher_process.php" method="POST">
        <!-- Teacher Name Input -->
        <div class="form-group">
          <label for="teacherName">Teacher's Name</label>
          <input type="text" class="form-control" id="teacherName" name="teacherName" placeholder="Enter Teacher's Name" required />
        </div>

        <!-- Multiple Subject Selection -->
        <div class="form-group">
          <label for="subjects">Select Subjects (Multiple)</label>
          <select class="form-control" id="subjects" name="subjects[]" multiple required>
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="English">English</option>
            <option value="History">History</option>
            <option value="Geography">Geography</option>
            <option value="Computer Science">Computer Science</option>
          </select>
        </div>

        <!-- Trainer Selection Dropdown -->
        <div class="form-group">
          <label for="trainer">Select Trainer</label>
          <select class="form-control" id="trainer" name="trainer" required>
            <option value="" disabled selected>Select Trainer</option>
            <option value="Trainer 1">Trainer 1</option>
            <option value="Trainer 2">Trainer 2</option>
            <option value="Trainer 3">Trainer 3</option>
            <option value="Trainer 4">Trainer 4</option>
            <option value="Trainer 5">Trainer 5</option>
          </select>
        </div>

        <!-- Hiring Date -->
        <div class="form-group">
          <label for="hiringDate">Hiring Date</label>
          <input type="date" class="form-control" id="hiringDate" name="hiringDate" required />
        </div>

        
        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-block">Hire Teacher</button>
      </form>
    </div>
  </div>
