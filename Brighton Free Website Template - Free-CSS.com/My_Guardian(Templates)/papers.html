<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previous Year Question Papers</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f6f9;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    .paper-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .paper-card {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .paper-card h3 {
      margin: 0;
      font-size: 18px;
      color: #2980b9;
    }

    .paper-card p {
      font-size: 14px;
      color: #7f8c8d;
    }

    .btn-group {
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      margin-right: 10px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      color: white;
    }

    .btn-view {
      background-color: #27ae60;
    }

    .btn-download {
      background-color: #3498db;
    }

    .btn:hover {
      opacity: 0.9;
    }

    @media(max-width: 600px) {
      .btn {
        display: block;
        margin-bottom: 8px;
      }
    }
  </style>
</head>
<body>

  <h1>Previous Year Question Papers</h1>

  <div class="paper-grid">
    <div class="paper-card">
      <h3>Mathematics - 2022</h3>
      <p>Class 10 | Board Exam</p>
      <div class="btn-group">
        <a href="papers/math_2022.pdf" class="btn btn-view" target="_blank">View</a>
        <a href="papers/math_2022.pdf" class="btn btn-download" download>Download</a>
      </div>
    </div>

    <div class="paper-card">
      <h3>Science - 2021</h3>
      <p>Class 10 | Mid Term</p>
      <div class="btn-group">
        <a href="papers/science_2021.pdf" class="btn btn-view" target="_blank">View</a>
        <a href="papers/science_2021.pdf" class="btn btn-download" download>Download</a>
      </div>
    </div>

    <div class="paper-card">
      <h3>English - 2020</h3>
      <p>Class 9 | Final Exam</p>
      <div class="btn-group">
        <a href="papers/english_2020.pdf" class="btn btn-view" target="_blank">View</a>
        <a href="papers/english_2020.pdf" class="btn btn-download" download>Download</a>
      </div>
    </div>

    <!-- Add more paper cards as needed -->
  </div>

</body>
</html>
