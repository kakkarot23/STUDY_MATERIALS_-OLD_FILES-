<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monthly Attendance Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="dashboard">
    <header>
      <h1>School Attendance Dashboard</h1>
    </header>

    <section class="summary">
      <div class="card">
        <h2>Total Students</h2>
        <p>250</p>
      </div>
      <div class="card">
        <h2>Average Attendance</h2>
        <p>92%</p>
      </div>
      <div class="card">
        <h2>Month</h2>
        <p>April 2025</p>
      </div>
    </section>

    <section class="attendance-table">
      <h2>Monthly Attendance Record</h2>
      <table>
        <thead>
          <tr>
            <th>Student Name</th>
            <th>Present Days</th>
            <th>Absent Days</th>
            <th>Attendance %</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>John Doe</td>
            <td>22</td>
            <td>2</td>
            <td>91.6%</td>
          </tr>
          <tr>
            <td>Jane Smith</td>
            <td>24</td>
            <td>0</td>
            <td>100%</td>
          </tr>
          <tr>
            <td>Ali Khan</td>
            <td>20</td>
            <td>4</td>
            <td>83.3%</td>
          </tr>
          <!-- Add more rows as needed -->
        </tbody>
      </table>
    </section>
  </div>
</body>
</html>
