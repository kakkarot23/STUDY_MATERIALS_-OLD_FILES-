<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Tracking Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    header {
      background: #003366;
      color: #fff;
      padding: 20px 40px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .dashboard-header h2 {
      font-size: 22px;
      color: #003366;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #ffffff;
      flex: 1;
      min-width: 240px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      font-size: 16px;
      color: #666;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 24px;
      color: #003366;
      margin: 0;
    }

    .map-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    .map-header {
      background: #005599;
      color: #fff;
      padding: 15px 20px;
      font-size: 18px;
    }

    iframe {
      width: 100%;
      height: 450px;
      border: none;
    }

    footer {
      margin-top: 40px;
      background: #003366;
      color: white;
      text-align: center;
      padding: 15px 0;
    }

    @media (max-width: 768px) {
      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .cards {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Student Tracking System</h1>
  </header>

  <div class="container">

    <!-- Dashboard Header -->
    <div class="dashboard-header">
      <h2>Welcome, Admin</h2>
      <span>Last updated: <strong>May 1, 2025, 10:45 AM</strong></span>
    </div>

    <!-- Summary Cards -->
    <div class="cards">
      <div class="card">
        <h3>Student Name</h3>
        <p>Vismaya A V</p>
      </div>
      <div class="card">
        <h3>Grade / Section</h3>
        <p>Grade 8 - B</p>
      </div>
      <div class="card">
        <h3>Attendance</h3>
        <p>63%</p>
      </div>
      <div class="card">
        <h3>Current Status</h3>
        <p>On Campus</p>
      </div>
    </div>

    <!-- Map Section -->
    <div class="map-section">
      <div class="map-header">Live Location Tracking</div>
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3900.815003378392!2d77.60201427484436!3d12.970211887360585!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae1671f36615bb%3A0x4d3c772ec9e5b8a!2sBangalore!5e0!3m2!1sen!2sin!4v1680692254305!5m2!1sen!2sin" 
        allowfullscreen="" 
        loading="lazy">
      </iframe>
    </div>

  </div>

  <!-- Footer -->
  <footer>
  </footer>

</body>
</html>
