
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #003366;
    }

    .calendar {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    .calendar-header {
      background: #003366;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #ddd;
    }

    .day, .date-cell {
      background: #fff;
      padding: 12px;
      text-align: center;
    }

    .day {
      background: #e6e6e6;
      font-weight: bold;
    }

    .present {
      background-color: #d4edda;
      color: #155724;
      font-weight: bold;
    }

    .absent {
      background-color: #f8d7da;
      color: #721c24;
      font-weight: bold;
    }

    .missing {
      background-color: #fff3cd;
      color: #856404;
      font-weight: bold;
    }

    .legend {
      margin-top: 20px;
      text-align: center;
    }

    .legend span {
      display: inline-block;
      padding: 8px 12px;
      margin: 0 10px;
      border-radius: 4px;
      font-weight: bold;
    }

    .legend .present { background: #d4edda; }
    .legend .absent { background: #f8d7da; }
    .legend .missing { background: #fff3cd; }
  </style>
</head>
<body>

  <h1>Student Attendance - April 2025</h1>

  <div class="calendar">
    <div class="calendar-header">April 2025</div>
    <div class="calendar-grid">
      <div class="day">Sun</div>
      <div class="day">Mon</div>
      <div class="day">Tue</div>
      <div class="day">Wed</div>
      <div class="day">Thu</div>
      <div class="day">Fri</div>
      <div class="day">Sat</div>

      <!-- Week 1 -->
      <div class="date-cell"></div>
      <div class="date-cell absent">1</div>
      <div class="date-cell present">2</div>
      <div class="date-cell present">3</div>
      <div class="date-cell missing">4</div>
      <div class="date-cell present">5</div>
      <div class="date-cell absent">6</div>

      <!-- Week 2 -->
      <div class="date-cell present">7</div>
      <div class="date-cell present">8</div>
      <div class="date-cell absent">9</div>
      <div class="date-cell present">10</div>
      <div class="date-cell missing">11</div>
      <div class="date-cell present">12</div>
      <div class="date-cell absent">13</div>

      <!-- Week 3 -->
      <div class="date-cell present">14</div>
      <div class="date-cell absent">15</div>
      <div class="date-cell present">16</div>
      <div class="date-cell present">17</div>
      <div class="date-cell missing">18</div>
      <div class="date-cell present">19</div>
      <div class="date-cell absent">20</div>

      <!-- Week 4 -->
      <div class="date-cell present">21</div>
      <div class="date-cell present">22</div>
      <div class="date-cell absent">23</div>
      <div class="date-cell present">24</div>
      <div class="date-cell present">25</div>
      <div class="date-cell present">26</div>
      <div class="date-cell absent">27</div>

      <!-- Week 5 -->
      <div class="date-cell present">28</div>
      <div class="date-cell present">29</div>
      <div class="date-cell absent">30</div>
      <div class="date-cell"></div>
      <div class="date-cell"></div>
      <div class="date-cell"></div>
      <div class="date-cell"></div>
    </div>
  </div>

  <div class="legend">
    <span class="present">Present</span>
    <span class="absent">Absent</span>
    <span class="missing">Missing</span>
  </div>

</body>
</html>
